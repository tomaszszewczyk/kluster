apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress
spec:
  project: default
  source:
    repoURL: https://github.com/tomaszszewczyk/kluster.git
    path: apps/wordpress
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
